name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Ensure configs directory
        run: |
          if (-not (Test-Path "configs")) { New-Item -ItemType Directory -Path "configs" | Out-Null }
          if (-not (Test-Path "configs\settings.json")) {
            @{
              clutch = "i"
              upshift = "e"
              downshift = "q"
              offroad_rally = $false
              enable_clutch = $true
              farming = $false
            } | ConvertTo-Json | Set-Content -Path "configs\settings.json" -Encoding UTF8
          }
          if (-not (Test-Path "example")) { New-Item -ItemType Directory -Path "example" | Out-Null }

      - name: Build
        run: |
          python -m PyInstaller `
            --noconfirm --onedir --windowed `
            --icon "icon\3.ico" `
            --name ForzaAutoGear `
            --paths "forza_motorsport" `
            --hidden-import fdp `
            --hidden-import numpy `
            --hidden-import matplotlib.backends.backend_qtagg `
            --collect-data matplotlib `
            --add-data "forza_motorsport\fdp.py;forza_motorsport" `
            --add-data "configs;configs" `
            --add-data "example;example" `
            --distpath output --workpath build --specpath build `
            --exclude-module tkinter --exclude-module test --exclude-module email `
            --exclude-module pydoc --exclude-module pdb --exclude-module lib2to3 `
            --exclude-module distutils --exclude-module setuptools --exclude-module pkg_resources `
            --exclude-module PySide6.Qt3DAnimation --exclude-module PySide6.Qt3DCore `
            --exclude-module PySide6.Qt3DExtras --exclude-module PySide6.Qt3DInput `
            --exclude-module PySide6.Qt3DLogic --exclude-module PySide6.Qt3DRender `
            --exclude-module PySide6.QtAsyncio --exclude-module PySide6.QtAxContainer `
            --exclude-module PySide6.QtAxBase --exclude-module PySide6.QtBluetooth `
            --exclude-module PySide6.QtCanvasPainter --exclude-module PySide6.QtCharts `
            --exclude-module PySide6.QtConcurrent --exclude-module PySide6.QtDBus `
            --exclude-module PySide6.QtDataVisualization --exclude-module PySide6.QtDesigner `
            --exclude-module PySide6.QtGraphs --exclude-module PySide6.QtGraphsWidgets `
            --exclude-module PySide6.QtHelp --exclude-module PySide6.QtHttpServer `
            --exclude-module PySide6.QtLocation --exclude-module PySide6.QtMultimedia `
            --exclude-module PySide6.QtMultimediaWidgets --exclude-module PySide6.QtNfc `
            --exclude-module PySide6.QtOpenGL --exclude-module PySide6.QtOpenGLWidgets `
            --exclude-module PySide6.QtPdf --exclude-module PySide6.QtPdfWidgets `
            --exclude-module PySide6.QtPositioning --exclude-module PySide6.QtPrintSupport `
            --exclude-module PySide6.QtQml --exclude-module PySide6.QtQuick `
            --exclude-module PySide6.QtQuick3D --exclude-module PySide6.QtQuickControls2 `
            --exclude-module PySide6.QtQuickTest --exclude-module PySide6.QtQuickWidgets `
            --exclude-module PySide6.QtRemoteObjects --exclude-module PySide6.QtScxml `
            --exclude-module PySide6.QtSensors --exclude-module PySide6.QtSerialBus `
            --exclude-module PySide6.QtSvg --exclude-module PySide6.QtSvgWidgets `
            --exclude-module PySide6.QtTest --exclude-module PySide6.QtTextToSpeech `
            --exclude-module PySide6.QtUiTools --exclude-module PySide6.QtWebChannel `
            --exclude-module PySide6.QtWebEngineCore --exclude-module PySide6.QtWebEngineQuick `
            --exclude-module PySide6.QtWebEngineWidgets --exclude-module PySide6.QtWebSockets `
            --exclude-module IPython --exclude-module notebook --exclude-module scipy `
            --exclude-module pandas --exclude-module xmlrpc --exclude-module pydoc_data `
            --exclude-module turtledemo --exclude-module idlelib `
            --exclude-module idlelib.idle_test --exclude-module lib2to3.tests `
            --exclude-module distutils.command `
            gui.py

      - name: Clean output
        run: |
          $internal = "output\ForzaAutoGear\_internal"

          # PySide6 translations: keep only English and Chinese
          $transDir = "$internal\PySide6\translations"
          if (Test-Path $transDir) {
            $keep = @('qt_en','qt_zh_CN','qt_zh_TW','qtbase_en','qtbase_zh_CN','qtbase_zh_TW')
            Get-ChildItem $transDir | Where-Object { $keep -notcontains $_.BaseName } | Remove-Item -Force
          }

          # PySide6 image format plugins: keep only qico
          $imgDir = "$internal\PySide6\plugins\imageformats"
          if (Test-Path $imgDir) {
            Get-ChildItem $imgDir | Where-Object { $_.Name -ne 'qico.dll' } | Remove-Item -Force
          }

          # PySide6 plugins: remove unused folders
          $pluginsDir = "$internal\PySide6\plugins"
          @('networkinformation','platforminputcontexts','tls','iconengines','generic','styles') | ForEach-Object {
            $p = Join-Path $pluginsDir $_
            if (Test-Path $p) { Remove-Item $p -Recurse -Force }
          }

          # PySide6: remove unused DLLs
          $pysideDir = "$internal\PySide6"
          Get-ChildItem $pysideDir -Filter "*.dll" | Where-Object {
            $n = $_.Name.ToLower()
            $n.StartsWith('qt6qml') -or $n.StartsWith('qt6quick') -or
            $n.Contains('virtualkeyboard') -or $n.Contains('network') -or
            $n.StartsWith('qt6pdf') -or $n -eq 'opengl32sw.dll' -or
            $n.StartsWith('qt6svg') -or $n.StartsWith('qt6test') -or
            $n.StartsWith('qt6location') -or $n.StartsWith('qt6bluetooth') -or
            $n.StartsWith('qt6nfc') -or $n.StartsWith('qt6sensors') -or
            $n.StartsWith('qt6serialbus') -or $n.StartsWith('qt6remoteobjects') -or
            $n.StartsWith('qt6scxml') -or $n.StartsWith('qt6texttospeech') -or
            $n.StartsWith('qt6webchannel') -or $n.StartsWith('qt6websockets') -or
            $n.StartsWith('qt6positioning') -or $n.StartsWith('qt6printsupport') -or
            $n.StartsWith('qt6help') -or $n.StartsWith('qt6httpserver')
          } | Remove-Item -Force

          # matplotlib: remove unnecessary files
          $mplData = "$internal\matplotlib\mpl-data"
          @('sample_data','images','plot_directive','stylelib') | ForEach-Object {
            $p = Join-Path $mplData $_
            if (Test-Path $p) { Remove-Item $p -Recurse -Force }
          }
          $lua = Join-Path $mplData "kpsewhich.lua"
          if (Test-Path $lua) { Remove-Item $lua -Force }

          # matplotlib fonts: keep only ttf with essential fonts
          $mplFonts = Join-Path $mplData "fonts"
          if (Test-Path $mplFonts) {
            $keepFonts = @('DejaVuSans.ttf','DejaVuSans-Bold.ttf','LastResortHE-Regular.ttf')
            Get-ChildItem $mplFonts | ForEach-Object {
              if ($_.Name -eq 'ttf') {
                Get-ChildItem $_.FullName | Where-Object { $keepFonts -notcontains $_.Name } | Remove-Item -Force
              } else {
                Remove-Item $_.FullName -Recurse -Force
              }
            }
          }

          # Remove _internal subfolders already at app root
          @('example','configs') | ForEach-Object {
            $p = Join-Path $internal $_
            if (Test-Path $p) { Remove-Item $p -Recurse -Force }
          }

          # Remove unnecessary Python files
          Get-ChildItem $internal -Directory | Where-Object { $_.Name -eq '__pycache__' } | Remove-Item -Recurse -Force
          @('LICENSE','README.md','setup.py','setup.cfg','pyproject.toml') | ForEach-Object {
            $p = Join-Path $internal $_
            if (Test-Path $p) { Remove-Item $p -Recurse -Force }
          }

          # Remove numpy dist-info
          Get-ChildItem $internal -Directory -Filter "numpy-*.dist-info" | Remove-Item -Recurse -Force

          # Remove unused PIL modules
          $pilDir = "$internal\PIL"
          @('_avif.cp313-win_amd64.pyd','_webp.cp313-win_amd64.pyd') | ForEach-Object {
            $p = Join-Path $pilDir $_
            if (Test-Path $p) { Remove-Item $p -Force }
          }

          # Remove Qt6OpenGL.dll
          $opengl = Join-Path $pysideDir "Qt6OpenGL.dll"
          if (Test-Path $opengl) { Remove-Item $opengl -Force }

      - name: Organize output
        run: |
          $appDir = "output\ForzaAutoGear"
          New-Item -ItemType Directory -Path "$appDir\log" -Force | Out-Null
          New-Item -ItemType Directory -Path "$appDir\icon" -Force | Out-Null
          Copy-Item "icon\3.ico" "$appDir\icon\3.ico" -Force

      - name: Compress output
        run: Compress-Archive -Path "output\ForzaAutoGear" -DestinationPath "ForzaAutoGear.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ForzaAutoGear
          path: ForzaAutoGear.zip

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ForzaAutoGear.zip
          generate_release_notes: true
